name: Generate Profile Animations

on:
  schedule:
    - cron: "0 */12 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. Create the dist folder manually to fix "Permission Denied"
      - name: Create dist directory
        run: mkdir -p dist

      # 2. Generate the Snake
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      # 3. Generate the Pacman (Fixed inputs)
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # Removed the 'svg_out_path' which caused the error

      # 4. Move the pacman file into dist (since the action puts it in root)
      - name: Move pacman to dist
        run: mv pacman-contribution-graph.svg dist/

      # 5. Push BOTH to the output branch
      - name: push animations to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
